# i3blocks config file
#
# Please see man i3blocks for a complete reference!
# The man page is also hosted at http://vivien.github.io/i3blocks
#
# List of valid properties:
#
# align
# color
# command
# full_text
# instance
# interval
# label
# min_width
# name
# separator
# separator_block_width
# short_text
# signal
# urgent

# Global properties
separator_block_width=15

[spotify]
label=
command=~/.config/spotify.py
color=#81b71a
interval=5

[volume]
label=♪
instance=Master
command=/usr/share/i3blocks/volume
interval=1
signal=10

[wireless]
#label=W:
instance=wlan0
instance=wlan0
command=/usr/share/i3blocks/network
interval=10

[battery]
label=⚡
command=/usr/share/i3blocks/battery
interval=30

[time]
command=date '+%H:%M %d/%m/%y'
interval=60
